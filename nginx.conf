server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    error_page 404 /404.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location /giscus-theme.css {
        add_header Access-Control-Allow-Origin "https://giscus.app";
        try_files $uri =404;
    }

    location /fonts/ {
        add_header Access-Control-Allow-Origin "https://giscus.app";
        try_files $uri =404;
    }
}
